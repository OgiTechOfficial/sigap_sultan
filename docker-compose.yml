services:
  backend:
    build:
      context: ./SPBI-BACKEND-main
      dockerfile: Dockerfile
    container_name: sigap_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - REDIS_HOST=redis_db
    depends_on:
      - postgres_db
      - redis_db
    networks:
      - sigap_network

  cms:
    build:
      context: ./SPBI-CMS-main
      dockerfile: Dockerfile
    container_name: sigap_cms
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_DATABASE=sigap_sultan
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_SCHEMA=dev
      - API_URL=http://sigap_backend:8080
    depends_on:
      - postgres_db
    networks:
      - sigap_network

  frontend:
    build:
      context: ./sigap-sultan-fe
      dockerfile: Dockerfile
    container_name: sigap_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BASE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - sigap_network

  postgres_db:
    image: postgres:15-alpine
    container_name: sigap_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sigap_sultan
    ports:
      - "5432:5432"
    networks:
      - sigap_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  mysql_db:
    image: mysql:8.0
    container_name: sigap_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: laravel
    ports:
      - "3306:3306"
    networks:
      - sigap_network
    volumes:
      - mysql_data:/var/lib/mysql

  redis_db:
    image: redis:7-alpine
    container_name: sigap_redis
    ports:
      - "6379:6379"
    networks:
      - sigap_network

networks:
  sigap_network:
    driver: bridge

volumes:
  postgres_data:
  mysql_data:
