<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 bg-slate-100">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img class="mx-auto h-10 w-auto" src="https://tailwindui.com/img/logos/mark.svg?color=indigo&shade=600"
      alt="Your Company">
    <h2 class="mt-10 text-center text-2xl font-bold leading-9 tracking-tight text-gray-900">Selamat Datang</h2>
    <h4 class="mt-10 text-center text-xl font-light leading-9 tracking-tight text-neutral-400">Tolong masukkan informasi
      akun mu untuk fitur yang lebih banyak dari biasanya.</h4>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="login()">
      <div>
        <label for="email" class="block text-sm font-medium leading-6 text-gray-900">Email</label>
        <div class="relative mt-2 rounded-md shadow-sm">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
            <span class="text-gray-500 sm:text-sm">
              <img src="assets/icons/mail.png" width="20px">
            </span>
          </div>
          <input type="email" name="email" id="email" formControlName="email" autocomplete="email" required class="block w-full rounded-md border-0 py-1.5 pl-10 pr-8 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
        </div>
        <span class="text-red-400 text-xs" [ngClass]="ctrl['email'].errors?.['required'] ? 'block' : 'hidden'">Email harus diisi</span>
        <span class="text-red-400 text-xs" [ngClass]="ctrl['email'].errors?.['email'] ? 'block' : 'hidden'">Email tidak valid</span>
      </div>

      <div>
        <div class="flex items-center">
          <label for="password" class="block text-sm font-medium leading-6 text-gray-900">Password</label>
        </div>
        <div class="relative mt-2 rounded-md shadow-sm">
          <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
            <span class="text-gray-500 sm:text-sm">
              <img src="assets/icons/lock.png" width="20px">
            </span>
          </div>
          <input id="password" name="password" formControlName="password" type="password" autocomplete="current-password" required class="block w-full rounded-md border-0 py-1.5 pl-10 pr-8 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
          <div class="absolute inset-y-0 flex items-center view">
            <span class="text-gray-500 sm:text-sm">
              <img src="assets/icons/view.png" width="20px">
            </span>
          </div>
        </div>
        <span class="text-red-400 text-xs" [ngClass]="ctrl['email'].errors?.['required'] ? 'block' : 'hidden'">Password harus diisi</span>
        <div class="flex items-center justify-end mt-3">
          <div class="text-sm">
            <a href="#" class="text-indigo-600 hover:text-indigo-500">Lupa password?</a>
          </div>
        </div>
      </div>

      <div>
        <button (click)="login()"
          class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Masuk</button>
      </div>
    </form>
  </div>
</div>
