<nav class="bg-[#0A5C95] shadow-md border-b border-blue-700/30">
  <div class="mx-auto w-full px-4 sm:px-6 lg:px-8">
    <div class="flex h-20 items-center justify-between">
      
      <!-- Left side: Logos and Title Branding -->
      <div class="flex items-center space-x-3">
        <!-- Logo Sulsel -->
        <img class="h-12 w-auto object-contain filter drop-shadow" 
             src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Coat_of_arms_of_South_Sulawesi.svg" 
             alt="Logo Sulawesi Selatan">
        <!-- Logo BI -->
        <img class="h-10 w-auto object-contain bg-white/10 rounded px-1.5 py-0.5 filter drop-shadow" 
             src="https://upload.wikimedia.org/wikipedia/commons/2/23/Bank_Indonesia_logo.svg" 
             alt="Logo Bank Indonesia">
        
        <!-- Divider -->
        <div class="h-10 w-[1px] bg-white/20"></div>
        
        <!-- Title Text -->
        <div class="flex flex-col text-white">
          <div class="flex items-center space-x-1.5">
            <span class="text-lg font-extrabold tracking-wider text-yellow-300 drop-shadow-sm font-sans">SIGAP SULTAN</span>
            <span class="text-[10px] uppercase font-semibold bg-blue-800 text-blue-200 px-1 rounded-sm border border-blue-600/30">Portal Publik</span>
          </div>
          <span class="text-[11px] font-medium tracking-wide text-blue-100 uppercase opacity-90 leading-tight">
            Sistem Informasi Harga dan Pasokan Pangan<br>Provinsi Sulawesi Selatan
          </span>
        </div>
      </div>

      <!-- Center/Right: Navigation Tabs & Log In -->
      <div class="flex items-center space-x-6">
        <!-- Navigation links -->
        <div class="hidden md:flex space-x-2">
          <ng-container *ngFor="let menu of menus">
            <a [routerLink]="menu.path" 
               [queryParams]="{tab: menu.name === 'Tabel Harga' ? 'harga' : menu.name === 'Tabel Neraca' ? 'neraca' : 'laporan'}"
               routerLinkActive="bg-white/10 text-white font-semibold border-b-2 border-yellow-300"
               [routerLinkActiveOptions]="{exact: false}"
               class="text-blue-100 hover:bg-white/5 hover:text-white rounded-md px-3.5 py-2 text-sm font-medium transition-all duration-200">
              {{menu.name}}
            </a>
          </ng-container>
        </div>

        <!-- Log in / Profile button -->
        <div class="flex items-center">
          <a routerLink="/login" 
             class="bg-white text-[#0A5C95] hover:bg-blue-50 font-bold px-5 py-2 rounded text-sm shadow transition-all duration-200 flex items-center space-x-1.5 border border-white">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
            <span>Log in</span>
          </a>
        </div>
      </div>

    </div>
  </div>
</nav>
